<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 1rem;
    }

    .calc {
      width: 340px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 20px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .app-title {
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .mode-toggle {
      display: flex;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 14px;
      gap: 3px;
    }

    .mode-btn {
      flex: 1;
      padding: 7px;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.45);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    .display {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 14px;
      padding: 14px 16px 10px;
      margin-bottom: 14px;
      min-height: 86px;
      text-align: right;
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .expr {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.38);
      min-height: 18px;
      word-break: break-all;
      margin-bottom: 6px;
    }

    .result {
      font-size: 38px;
      font-weight: 300;
      color: #fff;
      word-break: break-all;
      line-height: 1.1;
    }

    .sci-grid {
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    .sci-grid.visible {
      display: grid;
    }

    .basic-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .btn {
      height: 54px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-size: 16px;
      font-weight: 400;
      cursor: pointer;
      transition: transform 0.08s, filter 0.1s;
      color: #fff;
      background: rgba(255, 255, 255, 0.07);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover  { filter: brightness(1.25); }
    .btn:active { transform: scale(0.92); }

    .btn.num  { background: rgba(255, 255, 255, 0.1); }
    .btn.op   { background: rgba(147, 112, 219, 0.28); color: #c9a6f7; border-color: rgba(147,112,219,0.28); }
    .btn.eq   { background: rgba(147, 112, 219, 0.75); color: #fff; border-color: rgba(147,112,219,0.6); font-size: 22px; }
    .btn.fn   { background: rgba(255, 255, 255, 0.05); color: rgba(255,255,255,0.68); font-size: 13px; }
    .btn.clr  { background: rgba(220, 80, 80, 0.25); color: #ff8a8a; border-color: rgba(220,80,80,0.28); }
    .btn.wide2 { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calc">
    <p class="app-title">Calculator</p>

    <div class="mode-toggle">
      <button class="mode-btn active" id="btnBasic" onclick="setMode('basic')">Basic</button>
      <button class="mode-btn"        id="btnSci"   onclick="setMode('sci')">Scientific</button>
    </div>

    <div class="display">
      <div class="expr"   id="expr"></div>
      <div class="result" id="result">0</div>
    </div>

    <!-- Scientific row -->
    <div class="sci-grid" id="sciGrid">
      <button class="btn fn" onclick="sciOp('sin')">sin</button>
      <button class="btn fn" onclick="sciOp('cos')">cos</button>
      <button class="btn fn" onclick="sciOp('tan')">tan</button>
      <button class="btn fn" onclick="sciOp('log')">log</button>
      <button class="btn fn" onclick="sciOp('ln')">ln</button>
      <button class="btn fn" onclick="sciOp('sqrt')">√</button>
      <button class="btn fn" onclick="sciOp('sq')">x²</button>
      <button class="btn fn" onclick="sciOp('inv')">1/x</button>
      <button class="btn fn" onclick="insertConst('pi')">π</button>
      <button class="btn fn" onclick="insertConst('e')">e</button>
      <button class="btn fn" onclick="sciOp('pow')">xʸ</button>
      <button class="btn fn" onclick="sciOp('abs')">|x|</button>
    </div>

    <!-- Basic grid -->
    <div class="basic-grid">
      <button class="btn clr" onclick="clearAll()">AC</button>
      <button class="btn fn"  onclick="toggleSign()">+/−</button>
      <button class="btn fn"  onclick="inputPercent()">%</button>
      <button class="btn op"  onclick="inputOp('÷')">÷</button>

      <button class="btn num" onclick="inputNum('7')">7</button>
      <button class="btn num" onclick="inputNum('8')">8</button>
      <button class="btn num" onclick="inputNum('9')">9</button>
      <button class="btn op"  onclick="inputOp('×')">×</button>

      <button class="btn num" onclick="inputNum('4')">4</button>
      <button class="btn num" onclick="inputNum('5')">5</button>
      <button class="btn num" onclick="inputNum('6')">6</button>
      <button class="btn op"  onclick="inputOp('−')">−</button>

      <button class="btn num" onclick="inputNum('1')">1</button>
      <button class="btn num" onclick="inputNum('2')">2</button>
      <button class="btn num" onclick="inputNum('3')">3</button>
      <button class="btn op"  onclick="inputOp('+')">+</button>

      <button class="btn num wide2" onclick="inputNum('0')">0</button>
      <button class="btn num"       onclick="inputDot()">.</button>
      <button class="btn eq"        onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current   = '0';
    let expr      = '';
    let justCalc  = false;

    const D = id => document.getElementById(id);

    function update() {
      const display = current.length > 14
        ? parseFloat(current).toExponential(6)
        : current;
      D('result').textContent = display;
      D('expr').textContent   = expr;
    }

    function setMode(m) {
      D('btnBasic').classList.toggle('active', m === 'basic');
      D('btnSci').classList.toggle('active',   m === 'sci');
      D('sciGrid').classList.toggle('visible', m === 'sci');
    }

    function inputNum(n) {
      if (justCalc) { current = n; expr = ''; justCalc = false; }
      else current = current === '0' ? n : current + n;
      update();
    }

    function inputDot() {
      if (justCalc) { current = '0.'; expr = ''; justCalc = false; }
      else if (!current.includes('.')) current += '.';
      update();
    }

    function inputOp(op) {
      justCalc = false;
      expr     = (expr ? expr : current) + ' ' + op + ' ';
      current  = '0';
      update();
    }

    function clearAll() {
      current = '0'; expr = ''; justCalc = false; update();
    }

    function toggleSign() {
      current = current.startsWith('-') ? current.slice(1) : '-' + current;
      update();
    }

    function inputPercent() {
      current = String(parseFloat(current) / 100);
      update();
    }

    function sciOp(op) {
      const v   = parseFloat(current);
      const deg = v * Math.PI / 180;
      let r;
      switch (op) {
        case 'sin':  r = Math.sin(deg); break;
        case 'cos':  r = Math.cos(deg); break;
        case 'tan':  r = Math.tan(deg); break;
        case 'log':  r = Math.log10(v); break;
        case 'ln':   r = Math.log(v);   break;
        case 'sqrt': r = Math.sqrt(v);  break;
        case 'sq':   r = v * v;         break;
        case 'inv':  r = 1 / v;         break;
        case 'abs':  r = Math.abs(v);   break;
        case 'pow':
          expr = current + ' ^ ';
          current  = '0';
          justCalc = false;
          update();
          return;
      }
      expr     = op + '(' + current + ') =';
      current  = String(parseFloat(r.toFixed(10)));
      justCalc = true;
      update();
    }

    function insertConst(c) {
      const val = c === 'pi' ? Math.PI : Math.E;
      if (justCalc) expr = '';
      current  = String(parseFloat(val.toFixed(10)));
      justCalc = false;
      update();
    }

    function calculate() {
      if (!expr) return;
      const full = expr + current;
      try {
        const safe = full
          .replace(/÷/g, '/')
          .replace(/×/g, '*')
          .replace(/−/g, '-')
          .replace(/\^/g, '**');
        const r = Function('"use strict"; return (' + safe + ')')();
        expr     = full + ' =';
        current  = String(parseFloat(r.toFixed(10)));
        justCalc = true;
      } catch (e) {
        current = 'Error'; expr = '';
      }
      update();
    }

    /* Keyboard support */
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') inputNum(e.key);
      else if (e.key === '.')  inputDot();
      else if (e.key === '+')  inputOp('+');
      else if (e.key === '-')  inputOp('−');
      else if (e.key === '*')  inputOp('×');
      else if (e.key === '/')  { e.preventDefault(); inputOp('÷'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (current.length > 1) current = current.slice(0, -1);
        else current = '0';
        update();
      }
    });
  </script>
</body>
</html>
